name: Build and Release Music Player

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Windows EXE
      shell: pwsh
      run: |
        pyinstaller --onefile --windowed --name=MusicPlayer "源码/music_player.py"
        
    - name: Create Windows release package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist\windows-package | Out-Null
        Copy-Item "dist\MusicPlayer.exe" -Destination "dist\windows-package\"
        Copy-Item "源码\music_player.py" -Destination "dist\windows-package\源码\"
        Copy-Item "music_player_requirements.txt" -Destination "dist\windows-package\"
        Compress-Archive -Path "dist\windows-package\*" -DestinationPath "dist\MusicPlayer-Windows.zip"
        
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          dist/MusicPlayer.exe
          dist/MusicPlayer-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.3 platform-tools cmdline-tools;latest'

    - name: Set environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip-full gradle

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyqt6 pyqtdeploy pyinstaller

    - name: Build Android APK
      run: |
        python build_android_apk.py
        
    - name: Create Android release package
      run: |
        mkdir -p dist/android-package
        if [ -f "MusicPlayer.apk" ]; then
          cp MusicPlayer.apk dist/android-package/
        fi
        cp "源码/music_player.py" dist/android-package/
        cp android-music-player.pdy dist/android-package/
        cd dist
        7z a MusicPlayer-Android.zip android-package/*

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: |
          MusicPlayer.apk
          dist/MusicPlayer-Android.zip

  create-complete-package:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: artifacts/windows
        
    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-build
        path: artifacts/android
        
    - name: Create complete release package
      run: |
        mkdir -p complete-package
        cp artifacts/windows/*.zip complete-package/
        cp artifacts/android/*.zip complete-package/
        cp artifacts/android/*.apk complete-package/ 2>/dev/null || true
        cd complete-package
        7z a ../MusicPlayer-Complete.zip *
        
    - name: Upload complete package
      uses: actions/upload-artifact@v4
      with:
        name: complete-package
        path: MusicPlayer-Complete.zip

  release:
    needs: [build-windows, build-android, create-complete-package]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-artifacts/**/*.zip
          release-artifacts/**/*.exe
          release-artifacts/**/*.apk
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref_name }}
        body: |
          ## 音乐播放器 - 自动构建版本
          
          ### 包含内容
          - **Windows版本**: MusicPlayer-Windows.zip (含 EXE 可执行文件 + 源码)
          - **Android版本**: MusicPlayer-Android.zip (含 APK 安装包 + 源码)
          - **完整包**: MusicPlayer-Complete.zip (所有平台)
          
          ### 构建信息
          构建时间: ${{ github.event.release.created_at || github.event.head_commit.timestamp }}
          
          ### 注意事项
          - Windows版本需要Windows 10及以上系统
          - Android版本需要Android 7.0及以上系统
          - 首次运行可能需要配置下载路径
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}